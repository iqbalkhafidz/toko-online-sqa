name: SQA CI & CT Pipeline

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug
          tools: composer:v2 # Memaksa penggunaan Composer versi terbaru yang sinkron dengan PHP 8.2

      - name: Install PHP Dependencies
        # Menambahkan flag --ignore-platform-req=php untuk melewati proteksi versi PHP saat install
        run: composer install --prefer-dist --no-progress --ignore-platform-req=php

      - name: Run PHPUnit & Quality Metrics
        # Menambahkan --bootstrap vendor/autoload.php agar PHP mengenali semua komponen framework saat test berjalan
        run: |
          export XDEBUG_MODE=coverage
          php vendor/bin/phpunit --bootstrap vendor/autoload.php tests/ --coverage-text --coverage-filter src/ || php vendor/bin/phpunit tests/ --filter=Test --coverage-text --coverage-filter src/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install NPM Dependencies
        run: npm install

      - name: Start PHP Server
        run: php -S localhost:8000 > /dev/null 2>&1 &

      - name: Run Cypress E2E Tests
        uses: cypress-io/github-action@v6
        with:
          wait-on: 'http://localhost:8000'
          browser: chrome